apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-event-deployment
  labels:
    app: college-event
spec:
  replicas: 2
  selector:
    matchLabels:
      app: college-event
  template:
    metadata:
      labels:
        app: college-event
    spec:
      containers:
        - name: college-event-container
          image: college-event-website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
