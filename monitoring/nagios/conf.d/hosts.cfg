# Phase 7B - hosts monitored by this Nagios instance.
# All monitored endpoints (Jenkins, the Kubernetes-hosted website, the
# Kubernetes API) are reachable through Docker Desktop's host gateway,
# so they are modeled as services on a single logical host.

define host{
    use                     generic-host
    host_name               devops-host
    address                 host.docker.internal
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    contact_groups          admins
    register                1
    notes                   Represents the Docker Desktop host at host.docker.internal, which fronts Jenkins, the Kubernetes API, and the Kubernetes-hosted TechnoVista website for this Nagios instance.
}
