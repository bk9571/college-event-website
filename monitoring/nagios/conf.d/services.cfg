# Phase 7B - static service checks (Jenkins, Kubernetes API, Docker Engine proxy).
# The TechnoVista website check is generated separately by discover-nodeport.sh
# into technovista-website.cfg, because its port is dynamic (Kubernetes NodePort).

define service{
    use                     generic-service
    host_name               devops-host
    service_description     Jenkins HTTP
    check_command           check_http!-p 8080 -u /login
    notes                   Checks http://host.docker.internal:8080/login; /login is used instead of / because the root path requires auth and returns 403, while /login returns 200 when Jenkins is up.
}

define service{
    use                     generic-service
    host_name               devops-host
    service_description     Kubernetes API
    check_command           check_http!-p 6443 -S -u /healthz
    notes                   Checks https://host.docker.internal:6443/healthz; Docker Desktop's Kubernetes API uses a local self-signed cert. check_http (monitoring-plugins 2.4.12) does not perform strict CA validation by default, so it succeeds without any "skip verification" flag being set - no cert validation was silently disabled.
}

define service{
    use                     generic-service
    host_name               devops-host
    service_description     Docker Engine Proxy Check
    check_command           check_tcp!3000
    notes                   Direct Docker Engine health cannot be checked from this container: docker.sock is not mounted and Docker Desktop's remote API (port 2375) is closed by default; enabling either requires changing docker-compose.yml or host Docker settings, out of scope for this phase. As the closest practical proxy, this checks TCP port 3000 (Grafana, published by the same Docker Engine) - if the engine were down, this port would not be listening. This is an indirect signal, not a direct daemon health check.
}
